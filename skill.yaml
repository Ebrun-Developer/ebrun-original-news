name: ebrun-original-news
version: 1.0.0
description: 获取亿邦动力网最新电商新闻报道
author: EbrunDeveloper
date: '2026-04-13'

commands:
  - name: fetch
    description: 获取亿邦动力网指定频道的最新文章
    alias: f
    args:
      - name: channel
        description: 频道名称（推荐、未来零售、跨境电商、产业互联网、品牌、AI）
        required: false
        default: 推荐
      - name: limit
        description: 返回文章数量（最大20）
        required: false
        default: '10'
  - name: update
    description: 检查并引导更新技能到最新版本
    alias: u
